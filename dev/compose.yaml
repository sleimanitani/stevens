services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB}
    volumes:
      - ./langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"

  gmail-adapter:
    build:
      context: .
      dockerfile: channels/gmail/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GMAIL_PUBLIC_URL: ${GMAIL_PUBLIC_URL}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GMAIL_PUBSUB_TOPIC: ${GMAIL_PUBSUB_TOPIC}
      GMAIL_OAUTH_CLIENT_SECRETS: ${GMAIL_OAUTH_CLIENT_SECRETS}
    volumes:
      - ./secrets:/app/secrets:ro
    ports:
      # Only bound to localhost. Tailscale Funnel exposes this port publicly.
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  whatsapp-adapter:
    build:
      context: ./channels/whatsapp
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WHATSAPP_AUTH_DIR: ${WHATSAPP_AUTH_DIR}
    volumes:
      - ./whatsapp-auth:/app/whatsapp-auth
    ports:
      # Tailnet-only, never funneled publicly
      - "127.0.0.1:8081:8081"

  whatsapp-cloud-adapter:
    build:
      context: .
      dockerfile: channels/whatsapp-cloud/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEMIURGE_SECURITY_SOCKET: /run/demiurge/security.sock
      DEMIURGE_CALLER_NAME: whatsapp_cloud_adapter
      DEMIURGE_PRIVATE_KEY_PATH: /run/demiurge/keys/whatsapp_cloud_adapter.key
    volumes:
      - stevens-sock:/run/demiurge:ro
    ports:
      # Only bound to localhost. Funnel-exposed externally for Meta's webhook.
      - "127.0.0.1:8082:8082"

  calendar-adapter:
    build:
      context: .
      dockerfile: channels/calendar/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEMIURGE_SECURITY_SOCKET: /run/demiurge/security.sock
      DEMIURGE_CALLER_NAME: calendar_adapter
      DEMIURGE_PRIVATE_KEY_PATH: /run/demiurge/keys/calendar_adapter.key
    volumes:
      - stevens-sock:/run/demiurge:ro
    ports:
      - "127.0.0.1:8083:8083"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    environment:
      MODE: native    # native mode is fast; json-rpc mode supports more
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    ports:
      # Only bound to localhost. The signal-adapter talks to it via the
      # docker-internal network; the port is bound for QR-link inspection.
      - "127.0.0.1:8084:8080"

  signal-adapter:
    build:
      context: .
      dockerfile: channels/signal/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      signal-cli-rest-api:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEMIURGE_SECURITY_SOCKET: /run/demiurge/security.sock
      DEMIURGE_CALLER_NAME: signal_adapter
      DEMIURGE_PRIVATE_KEY_PATH: /run/demiurge/keys/signal_adapter.key
      SIGNAL_DAEMON_URL: http://signal-cli-rest-api:8080
      # SIGNAL_ACCOUNT_ID + SIGNAL_PHONE supplied per-account at runtime
      # (operator runs add_account first, then sets these env vars and
      # restarts this service — multi-account is one container per phone).
    volumes:
      - stevens-sock:/run/demiurge:ro

  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      GMAIL_ADAPTER_URL: http://gmail-adapter:8080
      WHATSAPP_ADAPTER_URL: http://whatsapp-adapter:8081
      DEMIURGE_SECURITY_SOCKET: /run/demiurge/security.sock
    volumes:
      - stevens-sock:/run/demiurge:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  security:
    build:
      context: .
      dockerfile: security/Dockerfile
    restart: unless-stopped
    environment:
      DEMIURGE_SECURITY_SOCKET: /run/demiurge/security.sock
      DEMIURGE_SECURITY_AUDIT_DIR: /var/lib/demiurge/audit
      DEMIURGE_SECURITY_SECRETS: /var/lib/demiurge/secrets
      DEMIURGE_LOG_LEVEL: ${DEMIURGE_LOG_LEVEL:-INFO}
    volumes:
      # Socket surface — agents mount this read-only. Only the security
      # container writes into /run/demiurge (the socket file itself).
      - stevens-sock:/run/demiurge
      - stevens-audit:/var/lib/demiurge/audit
      - stevens-secrets:/var/lib/demiurge/secrets
    read_only: true
    tmpfs:
      - /tmp
      - /home/stevens
    # No network access — UDS only. Prevents a compromised Security Agent
    # from dialing outbound on its own.
    network_mode: none

volumes:
  stevens-sock:
  stevens-audit:
  stevens-secrets:
  signal-cli-data:
